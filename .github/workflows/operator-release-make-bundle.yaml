name: Operator Release - Make Bundle
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to check out, regenerate bundle on, and push back to"
        required: true
        type: string
      version:
        description: "New release version, (e.g. 1.27.0-rc.1)"
        required: true
        type: string
      latest_version:
        description: "Previous released version, (e.g. 1.26.0)"
        required: true
        type: string
      correlation_id:
        description: "Correlation ID, surfaced in run-name so the caller can find this run"
        required: true
        type: string

run-name: "operator release - make bundle ${{ inputs.version }} [${{ inputs.correlation_id }}]"

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Generate bundle
        run: make bundle VERSION=${{ inputs.version }} LATEST_VERSION=${{ inputs.latest_version }}

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No bundle changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage all bundle changes
        if: steps.changes.outputs.has_changes == 'true'
        run: git add -A

      # Commits made via the GitHub API are automatically signed by GitHub
      - name: Commit bundle (signed via GitHub API)
        if: steps.changes.outputs.has_changes == 'true'
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: "chore(bundle): regenerate for v${{ inputs.version }}"
          repo: ${{ github.repository }}
          branch: ${{ inputs.branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
