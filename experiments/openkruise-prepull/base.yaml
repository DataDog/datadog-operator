apiVersion: v1
kind: Namespace
metadata:
  name: openkruise-prepull-lab
---
apiVersion: apps.kruise.io/v1beta1
kind: DaemonSet
metadata:
  name: inplace-demo
  namespace: openkruise-prepull-lab
spec:
  selector:
    matchLabels:
      app: inplace-demo
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      rollingUpdateType: InPlaceIfPossible
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: inplace-demo
    spec:
      nodeSelector:
        kubernetes.io/hostname: zero-gap-agent-rollout-worker
      terminationGracePeriodSeconds: 1
      containers:
        - name: server
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /www
              printf 'ok\n' >/www/index.html
              exec python -m http.server 8080 --directory /www
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inplace-demo
  namespace: openkruise-prepull-lab
spec:
  selector:
    app: inplace-demo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: observer
  namespace: openkruise-prepull-lab
spec:
  nodeSelector:
    kubernetes.io/hostname: zero-gap-agent-rollout-worker2
  restartPolicy: Never
  containers:
    - name: observer
      image: alpine:3.20
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          sequence=0
          while true; do
            sequence=$((sequence + 1))
            if wget -q -T 1 -O /dev/null http://inplace-demo; then
              printf '%d OK\n' "${sequence}"
            else
              printf '%d FAIL\n' "${sequence}"
            fi
            sleep 0.1
          done
      resources:
        requests:
          cpu: 5m
          memory: 4Mi
        limits:
          memory: 16Mi
