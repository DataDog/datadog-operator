apiVersion: apps.kruise.io/v1alpha1
kind: ImagePullJob
metadata:
  name: python-3-14-alpine
  namespace: openkruise-prepull-lab
spec:
  image: python:3.14-alpine
  imagePullPolicy: IfNotPresent
  selector:
    matchLabels:
      kubernetes.io/hostname: zero-gap-agent-rollout-worker
  parallelism: 1
  pullPolicy:
    timeoutSeconds: 300
    backoffLimit: 1
  completionPolicy:
    type: Always
    activeDeadlineSeconds: 360
