apiVersion: apps.kruise.io/v1alpha1
kind: ImagePullJob
metadata:
  name: python-missing
  namespace: openkruise-prepull-lab
spec:
  image: python:zero-gap-tag-does-not-exist
  imagePullPolicy: Always
  selector:
    matchLabels:
      kubernetes.io/hostname: zero-gap-agent-rollout-worker
  parallelism: 1
  pullPolicy:
    timeoutSeconds: 60
    backoffLimit: 0
  completionPolicy:
    type: Always
    activeDeadlineSeconds: 90
