# hack/perf/ddgr-loadtest/manifests/datadogagent.yaml
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: system
spec:
  global:
    kubelet:
      tlsVerify: false
    clusterName: ddgr-perf-test
    site: datadoghq.com # adjust if sandbox is on a different site (e.g. datadoghq.eu)
    credentials:
      apiSecret:
        secretName: sandbox-datadog-creds
        keyName: api-key
      appSecret:
        secretName: sandbox-datadog-creds
        keyName: app-key
    tags:
      - "env:ddgr-perf-test"
  features:
    logCollection:
      enabled: true
      containerCollectAll: true
  override:
    nodeAgent:
      containers:
        agent:
          env:
            - name: DD_CLUSTER_NAME
              value: ddgr-test
