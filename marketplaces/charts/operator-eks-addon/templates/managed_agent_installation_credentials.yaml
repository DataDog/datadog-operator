{{- with .Values.managedAgentInstallationCredentials }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datadog-ascp-sync
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: datadog-ascp-secret-sync
    app.kubernetes.io/managed-by: eks-addon
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: datadog-api-key
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: datadog-ascp-secret-sync
    app.kubernetes.io/managed-by: eks-addon
spec:
  provider: aws
  secretObjects:
    - secretName: datadog-secret
      type: Opaque
      labels:
        app.kubernetes.io/managed-by: eks-addon
      data:
        - objectName: api-key
          key: api-key
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: {{ .secretsManagerSecretID | quote }}
        objectType: secretsmanager
        objectAlias: api-key
        filePermission: "0400"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadog-ascp-secret-sync
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: datadog-ascp-secret-sync
    app.kubernetes.io/managed-by: eks-addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datadog-ascp-secret-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datadog-ascp-secret-sync
        app.kubernetes.io/managed-by: eks-addon
    spec:
      serviceAccountName: datadog-ascp-sync
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: eks.amazonaws.com/compute-type
                    operator: NotIn
                    values:
                      - fargate
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: secret-sync
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args: ["trap : TERM INT; sleep infinity & wait"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: datadog-api-key
              mountPath: /mnt/datadog-api-key
              readOnly: true
      volumes:
        - name: datadog-api-key
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: datadog-api-key
{{- end }}
