apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: system
  annotations:
    agent.datadoghq.com/flightrecorder-enabled: "true"
spec:
  global:
    clusterName: kind-flightrecorder
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
    registry: docker.io
  override:
    nodeAgent:
      image:
        name: datadog/agent-dev
        tag: misteriaud-poc-signal-recorder-full
        pullPolicy: Never
    clusterAgent:
      image:
        name: datadog/agent-dev
        tag: misteriaud-poc-signal-recorder-full
        pullPolicy: Never
