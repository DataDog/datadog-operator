apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  namespace: e2e-operator
  labels:
    agent.datadoghq.com/e2e-test: datadog-agent-dsd-udp
spec:
  global:
    registry: public.ecr.aws/datadog
    kubelet:
      tlsVerify: false
  features:
    dogstatsd:
      hostPortConfig:
        enabled: true
        hostPort: 8125
      unixDomainSocketConfig:
        enabled: false
  override:
    nodeAgent:
      envFrom:
        - configMapRef:
            name: datadog-operator-e2e-agent-metrics-v2-env
    clusterAgent:
      envFrom:
        - configMapRef:
            name: datadog-operator-e2e-agent-metrics-v2-env
    clusterChecksRunner:
      envFrom:
        - configMapRef:
            name: datadog-operator-e2e-agent-metrics-v2-env
