apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  namespace: e2e-operator
  labels:
    agent.datadoghq.com/e2e-test: datadog-agent-minimum
spec:
  global:
    kubelet:
      tlsVerify: false
    env:
      - name: DD_KUBELET_CORE_CHECK_ENABLED
        value: "false"
  features:
    serviceDiscovery:
      enabled: false
