apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog-agent-logs
  namespace: e2e-operator
  labels:
    agent.datadoghq.com/e2e-test: datadog-agent-logs
spec:
  global:
    kubelet:
      tlsVerify: false
    env:
      - name: DD_KUBELET_CORE_CHECK_ENABLED
        value: "false"
  features:
    serviceDiscovery:
      enabled: false
    clusterChecks:
      enabled: true
      useClusterChecksRunners: false
    logCollection:
      enabled: true
      containerCollectAll: true
    liveContainerCollection:
      enabled: true
